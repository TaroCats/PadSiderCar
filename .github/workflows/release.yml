name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "发布到 GitHub Releases 的标签，例如 v1.0.0；留空则只上传 workflow artifact"
        required: false
        type: string
      prerelease:
        description: "手动发布时是否标记为预发布"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            VERSION="${GITHUB_REF_NAME#v}"
            SHOULD_PUBLISH_RELEASE="true"
            RELEASE_PRERELEASE="false"
          elif [[ -n "${{ github.event.inputs.release_tag || '' }}" ]]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
            RELEASE_TAG="${RELEASE_TAG#refs/tags/}"
            if [[ "$RELEASE_TAG" != v* ]]; then
              RELEASE_TAG="v$RELEASE_TAG"
            fi
            VERSION="${RELEASE_TAG#v}"
            SHOULD_PUBLISH_RELEASE="true"
            RELEASE_PRERELEASE="${{ github.event.inputs.prerelease || 'true' }}"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
            SHOULD_PUBLISH_RELEASE="false"
            RELEASE_PRERELEASE="true"
          fi

          echo "RELEASE_TAG=${RELEASE_TAG:-}" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "SHOULD_PUBLISH_RELEASE=$SHOULD_PUBLISH_RELEASE" >> "$GITHUB_ENV"
          echo "RELEASE_PRERELEASE=$RELEASE_PRERELEASE" >> "$GITHUB_ENV"

      - name: Build app bundle
        shell: bash
        run: bash scripts/build_app.sh

      - name: Package DMG
        shell: bash
        run: bash scripts/package_dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PadSidecar-${{ env.VERSION }}-dmg
          path: dist/*.dmg

      - name: Publish release
        if: env.SHOULD_PUBLISH_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: PadSidecar ${{ env.VERSION }}
          files: dist/*.dmg
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          generate_release_notes: true
          fail_on_unmatched_files: true
